<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Eligibility Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <button class="mode-btn" onclick="toggleMode()">🌙 Toggle Mode</button>

    <h1>👤 Age Eligibility Checker</h1>
    <p>Check your eligibility for voting and driving</p>

    <input type="number" id="age" placeholder="Enter your age">

    <button onclick="checkAge()">Check Eligibility</button>

    <h2 id="result">Result will appear here</h2>

</div>

<script src="script.js"></script>

</body>
</html>
